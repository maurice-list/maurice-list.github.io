<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog</title>
    <link href='https://fonts.googleapis.com/css?family=Lexend+Deca' rel='stylesheet'>
    <link rel="icon" href="/resources/icons/maurice.png">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1908323352197629"
     crossorigin="anonymous"></script>
    <script>if (document.cookie.includes('darkMode=1')) document.documentElement.classList.add('dark');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }

        :root {
            --bg:           #ffffff;
            --text:         #000000;
            --text-gray:    gray;
            --header-bg:    lightcoral;
            --header-text:  #000000;
            --border:       #ddd;
            --table-head:   #f2f2f2;
        }
        html.dark body {
            --bg:           #1e1e1e;
            --text:         #e0e0e0;
            --text-gray:    #888888;
            --header-bg:    #3a3a3a;
            --header-text:  #f0f0f0;
            --border:       #555555;
            --table-head:   #2a2a2a;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* ── Header ── */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 20px;
            background-color: var(--header-bg);
            transition: background-color 0.3s;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left img { width: 42px; height: 42px; flex-shrink: 0; }
        .header-right { display: flex; align-items: center; }
        .site-title { font-family: 'Lexend Deca', sans-serif; font-size: 22px; color: var(--header-text); }
        .site-title a { color: inherit; text-decoration: none; }
        .site-title a:hover { opacity: 0.85; }
        .header-right a {
            font-family: 'Lexend Deca';
            font-size: 20px;
            font-weight: bolder;
            text-decoration: none;
            color: var(--header-text);
            margin-left: 18px;
        }
        #dark-toggle {
            background: none;
            border: 2px solid var(--header-text);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 16px;
            color: var(--header-text);
            transition: border-color 0.3s, color 0.3s;
            line-height: 1;
            flex-shrink: 0;
        }
        #dark-toggle:hover { opacity: 0.8; }

        @media (max-width: 520px) {
            .header-left { flex: 1 1 100%; }
            .header-right { flex: 1 1 100%; }
            .header-right a:first-child { margin-left: 0; }
            .site-title { font-size: 18px; }
            .header-right a { font-size: 16px; margin-left: 14px; }
            #dark-toggle { font-size: 16px; margin-left: 14px; }
        }

        /* ── Content ── */
        .page-content { padding: 20px; }
        h1.page-heading { margin-bottom: 20px; color: var(--text); }
        .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; min-width: 480px; }
        th, td { border: 1px solid var(--border); padding: 8px; color: var(--text); }
        th { background-color: var(--table-head); }

        @media (max-width: 600px) {
            .page-content { padding: 12px; }
            th, td { font-size: 13px; padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="header-left">
            <h1 class="site-title"><a href="/">Maurice Challenge List</a></h1>
            <img src="/resources/images/GrandpaDemon.png" alt="Maurice Icon">
        </div>
        <div class="header-right">
            <a href="/leaderboard">Leaderboard</a>
            <a href="/changelog">Changelog</a>
            <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        </div>
    </div>
    <script>
        function applyDark(dark) {
            document.documentElement.classList.toggle('dark', dark);
            document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
        }
        function toggleDark() {
            const isDark = !document.documentElement.classList.contains('dark');
            document.cookie = 'darkMode=' + (isDark ? '1' : '0') + '; path=/; max-age=31536000';
            applyDark(isDark);
        }
        applyDark(document.documentElement.classList.contains('dark'));
    </script>
    <div class="page-content">
        <h1 class="page-heading">Changelog</h1>
        <div id="changelog-container"></div>
    </div>
    <script>
        const changelogContainer = document.getElementById('changelog-container');

        Promise.all([
            fetch('/resources/data/changelog.json').then(r => r.json()),
            fetch('/resources/data/levels.json').then(r => r.json())
        ])
        .then(([changelogData, levelsData]) => {
            return Promise.all(
                levelsData.map(id =>
                    fetch(`/resources/data/levels/${id}.json`).then(r => r.json()).then(l => ({ id, name: l.name }))
                )
            ).then(levels => {
                const levelMap = Object.fromEntries(levels.map(l => [l.id, l.name]));
                return { changelogData, levelMap };
            });
        })
        .then(({ changelogData, levelMap }) => {
            changelogData.sort((a, b) => b.date - a.date);
            let rows = changelogData.map(entry => {
                const levelName = levelMap[entry.name] || entry.name;
                let details = '';
                if (entry.action === 'placed') {
                    if (entry.above && entry.below) details = `Placed above ${levelMap[entry.above] || entry.above} and below ${levelMap[entry.below] || entry.below}`;
                    else if (entry.above) details = `Placed above ${levelMap[entry.above] || entry.above}`;
                    else if (entry.below) details = `Placed below ${levelMap[entry.below] || entry.below}`;
                } else if (entry.action === 'swapped') {
                    details = `Swapped with ${levelMap[entry.above] || entry.above}`;
                } else if (entry.action === 'moved') {
                    if (entry.to_rank === 0) { entry.to_rank = '-'; details = 'Removed from the list'; }
                    else details = `Moved above ${levelMap[entry.above] || entry.above} and below ${levelMap[entry.below] || entry.below}`;
                }
                return `<tr>
                    <td>${new Date(entry.date * 1000).toLocaleDateString()}</td>
                    <td>${levelName}</td>
                    <td>${entry.action}</td>
                    <td>${entry.from_rank || '-'}</td>
                    <td>${entry.to_rank}</td>
                    <td>${details}</td>
                </tr>`;
            }).join('');

            changelogContainer.innerHTML = `
                <div class="table-scroll"><table>
                    <thead><tr><th>Date</th><th>Level</th><th>Action</th><th>From Position</th><th>To Position</th><th>Details</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table></div>`;
        })
        .catch(() => { changelogContainer.innerText = 'Error loading changelog.'; });
    </script>
</body>
</html>
