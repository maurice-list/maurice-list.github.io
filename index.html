<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maurice Challenge List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Lexend+Deca' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Montserrat' rel='stylesheet'>
    <link rel="icon" href="/resources/icons/maurice.png">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1908323352197629"
     crossorigin="anonymous"></script>
    <script>if (document.cookie.includes('darkMode=1')) document.documentElement.classList.add('dark');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }

        :root {
            --bg:           #ffffff;
            --text:         #000000;
            --text-sub:     rgb(65, 65, 65);
            --header-bg:    lightcoral;
            --header-text:  #000000;
            --border:       gray;
            --item-bg:      #ffffff;
        }
        html.dark body {
            --bg:           #1e1e1e;
            --text:         #e0e0e0;
            --text-sub:     #aaaaaa;
            --header-bg:    #3a3a3a;
            --header-text:  #f0f0f0;
            --border:       #555555;
            --item-bg:      #2a2a2a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* ── Header ── */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 20px;
            background-color: var(--header-bg);
            transition: background-color 0.3s;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left img { width: 42px; height: 42px; flex-shrink: 0; }
        .header-right { display: flex; align-items: center; }
        .site-title { font-family: 'Lexend Deca', sans-serif; font-size: 22px; color: var(--header-text); }
        .site-title a { color: inherit; text-decoration: none; }
        .site-title a:hover { opacity: 0.85; }
        .header-right a {
            font-family: 'Lexend Deca';
            font-size: 20px;
            font-weight: bolder;
            text-decoration: none;
            color: var(--header-text);
            margin-left: 18px;
        }
        #dark-toggle {
            background: none;
            border: 2px solid var(--header-text);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 16px;
            color: var(--header-text);
            transition: border-color 0.3s, color 0.3s;
            line-height: 1;
            flex-shrink: 0;
        }
        #dark-toggle:hover { opacity: 0.8; }

        @media (max-width: 520px) {
            .header-left { flex: 1 1 100%; }
            .header-right { flex: 1 1 100%; }
            .header-right a:first-child { margin-left: 0; }
            .site-title { font-size: 18px; }
            .header-right a { font-size: 16px; margin-left: 14px; }
            #dark-toggle { font-size: 16px; margin-left: 14px; }
        }

        /* ── List ── */
        .demon-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 0 16px;
            margin-top: 20px;
        }
        .demon-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin: 12px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            background-color: var(--item-bg);
            transition: background-color 0.3s, border-color 0.3s;
            overflow: hidden;
        }
        .demon-item > a { flex-shrink: 0; padding: 10px 0 10px 10px; }
        .demon-item img {
            display: block;
            width: 240px;
            height: 135px;
            object-fit: cover;
            border-radius: 6px;
        }
        .demon-info { display: flex; flex-direction: column; padding: 12px 16px; min-width: 0; }
        .demon-info a {
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            font-weight: bolder;
            font-family: "Montserrat";
            line-height: 1.3;
        }
        .demon-info span {
            color: var(--text-sub);
            font-size: 15px;
            font-family: "Montserrat";
            font-weight: bold;
            margin-top: 6px;
        }

        @media (max-width: 600px) {
            .demon-item { flex-direction: column; align-items: stretch; }
            .demon-item > a { width: 100%; padding: 10px 10px 0 10px; }
            .demon-item img { width: 100%; height: auto; aspect-ratio: 16 / 9; border-radius: 6px; }
            .demon-info { padding: 10px 14px 14px; }
            .demon-info a { font-size: 18px; }
            .demon-info span { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="header-left">
            <h1 class="site-title"><a href="/">Maurice Challenge List</a></h1>
            <img src="/resources/images/GrandpaDemon.png" alt="Maurice Icon">
        </div>
        <div class="header-right">
            <a href="/leaderboard">Leaderboard</a>
            <a href="/changelog">Changelog</a>
            <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        </div>
    </div>
    <div class="demon-list"></div>
    <script>
        const btn = document.getElementById('dark-toggle');
        function applyDark(dark) {
            document.documentElement.classList.toggle('dark', dark);
            btn.textContent = dark ? '☀️' : '🌙';
        }
        function toggleDark() {
            const isDark = !document.documentElement.classList.contains('dark');
            document.cookie = 'darkMode=' + (isDark ? '1' : '0') + '; path=/; max-age=31536000';
            applyDark(isDark);
        }
        applyDark(document.documentElement.classList.contains('dark'));
    </script>
    <script>
        const container = document.querySelector('.demon-list');
        Promise.all([
            fetch('/resources/data/users.json').then(r => r.json()),
            fetch('/resources/data/levels.json').then(r => r.json())
        ])
        .then(([userMap, levelIds]) => {
            return Promise.all(
                levelIds.map(id =>
                    fetch(`/resources/data/levels/${id}.json`)
                        .then(resp => resp.json())
                        .catch(error => { console.error(`Error loading level ${id}:`, error); return null; })
                )
            ).then(levels => ({ userMap, levels }));
        })
        .then(({ userMap, levels }) => {
            const validLevels = levels.filter(level => level !== null);
            validLevels.forEach((demon, idx) => {
                const placement = idx + 1;
                const demonDiv = document.createElement('div');
                demonDiv.classList.add('demon-item');
                demonDiv.innerHTML = `
                    <a href="https://youtu.be/${demon.verification}" target="_blank">
                        <img src="https://i.ytimg.com/vi/${demon.verification}/mqdefault.jpg" alt="${demon.name}">
                    </a>
                    <div class="demon-info">
                        <a href="./list?placement=${placement}">#${placement} - ${demon.name}</a>
                        <span>${userMap[demon.creators[0]] || demon.creators[0]}</span>
                    </div>
                `;
                container.appendChild(demonDiv);
            });
        })
        .catch(error => console.error('Error loading levels:', error));
    </script>
</body>
</html>
