<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link href='https://fonts.googleapis.com/css?family=Lexend+Deca' rel='stylesheet'>
    <link rel="icon" href="/resources/icons/maurice.png">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1908323352197629"
     crossorigin="anonymous"></script>
    <script>if (document.cookie.includes('darkMode=1')) document.documentElement.classList.add('dark');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }

        :root {
            --bg:           #ffffff;
            --text:         #000000;
            --header-bg:    lightcoral;
            --header-text:  #000000;
            --border:       #ddd;
            --table-head:   #f2f2f2;
        }
        html.dark body {
            --bg:           #1e1e1e;
            --text:         #e0e0e0;
            --header-bg:    #3a3a3a;
            --header-text:  #f0f0f0;
            --border:       #555555;
            --table-head:   #2a2a2a;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* ── Header ── */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 20px;
            background-color: var(--header-bg);
            transition: background-color 0.3s;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left img { width: 42px; height: 42px; flex-shrink: 0; }
        .header-right { display: flex; align-items: center; }
        .site-title { font-family: 'Lexend Deca', sans-serif; font-size: 22px; color: var(--header-text); }
        .site-title a { color: inherit; text-decoration: none; }
        .site-title a:hover { opacity: 0.85; }
        .header-right a {
            font-family: 'Lexend Deca';
            font-size: 20px;
            font-weight: bolder;
            text-decoration: none;
            color: var(--header-text);
            margin-left: 18px;
        }
        #dark-toggle {
            background: none;
            border: 2px solid var(--header-text);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 16px;
            color: var(--header-text);
            transition: border-color 0.3s, color 0.3s;
            line-height: 1;
            flex-shrink: 0;
        }
        #dark-toggle:hover { opacity: 0.8; }

        @media (max-width: 520px) {
            .header-left { flex: 1 1 100%; }
            .header-right { flex: 1 1 100%; }
            .header-right a:first-child { margin-left: 0; }
            .site-title { font-size: 18px; }
            .header-right a { font-size: 16px; margin-left: 14px; }
            #dark-toggle { font-size: 16px; margin-left: 14px; }
        }

        /* ── Content ── */
        .page-content { padding: 20px; }
        h1.page-heading { text-align: center; margin-bottom: 20px; color: var(--text); }
        .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; min-width: 360px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; color: var(--text); }
        th { background-color: var(--table-head); }

        @media (max-width: 600px) {
            .page-content { padding: 12px; }
            th, td { font-size: 13px; padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="header-left">
            <h1 class="site-title"><a href="/">Maurice Challenge List</a></h1>
            <img src="/resources/images/GrandpaDemon.png" alt="Maurice Icon">
        </div>
        <div class="header-right">
            <a href="/leaderboard">Leaderboard</a>
            <a href="/changelog">Changelog</a>
            <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        </div>
    </div>
    <script>
        function applyDark(dark) {
            document.documentElement.classList.toggle('dark', dark);
            document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
        }
        function toggleDark() {
            const isDark = !document.documentElement.classList.contains('dark');
            document.cookie = 'darkMode=' + (isDark ? '1' : '0') + '; path=/; max-age=31536000';
            applyDark(isDark);
        }
        applyDark(document.documentElement.classList.contains('dark'));
    </script>
    <div class="page-content">
        <h1 class="page-heading">Leaderboard</h1>
        <div id="leaderboard-container">Loading leaderboard...</div>
    </div>
    <script>
        const leaderboardContainer = document.getElementById("leaderboard-container");

        function calculatePoints(placement, totalLevels, topPoints = 100, bottomPoints = 20) {
            const range = Math.log(totalLevels);
            const logPlacement = Math.log(placement);
            const normalized = logPlacement / range;
            return Math.round(topPoints - normalized * (topPoints - bottomPoints));
        }

        Promise.all([
            fetch("/resources/data/users.json").then(r => r.json()),
            fetch("/resources/data/levels.json").then(r => r.json())
        ])
        .then(([userMap, levelIds]) => {
            return Promise.all(
                levelIds.map(id =>
                    fetch(`/resources/data/levels/${id}.json`)
                        .then(r => r.json())
                        .catch(() => null)
                )
            ).then(levels => ({ userMap, levels: levels.filter(Boolean) }));
        })
        .then(({ userMap, levels }) => {
            const totalLevels = levels.length;
            const leaderboard = Object.keys(userMap).map(userId => {
                let totalPoints = 0;
                const beatenLevels = levels.filter(level => {
                    const isInRecords = level.records && level.records.some(r => r.user === userId);
                    return isInRecords || level.verifier === userId;
                });
                beatenLevels.forEach(level => {
                    totalPoints += calculatePoints(levels.indexOf(level) + 1, totalLevels);
                });
                const hardest = beatenLevels.reduce((h, l) => (!h || l.difficulty > h.difficulty ? l : h), null);
                return { name: userMap[userId], levelsBeaten: beatenLevels.length, hardestLevel: hardest ? hardest.name : "None", totalPoints };
            });
            leaderboard.sort((a, b) => b.totalPoints - a.totalPoints);

            leaderboardContainer.innerHTML = `
                <div class="table-scroll"><table>
                    <thead><tr><th>Rank</th><th>Name</th><th>Levels Beaten</th><th>Hardest Level</th><th>Total Points</th></tr></thead>
                    <tbody>${leaderboard.map((p, i) => `
                        <tr><td>${i+1}</td><td>${p.name}</td><td>${p.levelsBeaten}</td><td>${p.hardestLevel}</td><td>${p.totalPoints}</td></tr>
                    `).join('')}</tbody>
                </table></div>`;
        })
        .catch(err => { leaderboardContainer.innerText = "Error loading leaderboard."; });
    </script>
</body>
</html>
